<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Shapefile Manager - Advanced Topology</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shpjs/6.1.0/shp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        button {
            background: #1f1f1f;
            color: white;
            border: 1px solid #444;
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #333; border-color: #00ff9d; transform: translateY(-1px); }
        button.danger { background: #3a1a1a; border-color: #ff6666; color: #ff9999; }
        #container { flex: 1; display: flex; flex-direction: column; }
        #map { flex: 1; position: relative; }
        #database-panel {
            height: 340px;
            background: #111;
            border-top: 2px solid #00ff9d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #panel-header {
            padding: 10px 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
            display: block;
        }
        thead { display: block; }
        tbody {
            display: block;
            overflow-y: auto;
            max-height: calc(340px - 52px);
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { background: #1a1a1a; position: sticky; top: 0; z-index: 10; }
        tr:hover { background: #1e3a2f; }
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 400px;
            background: rgba(15, 23, 42, 0.97);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff9d;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
        }
        .item-marker {
            font-size: 28px;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 8px #00ff9d;
        }
        .issue-item { 
            color: #ff9999; 
            margin: 8px 0; 
            padding: 6px 10px; 
            border-left: 3px solid #ff6666; 
            background: #1a1a1a;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">🗺️ GIS Shapefile Manager</div>
    <div class="controls">
        <button onclick="document.getElementById('shp-upload').click()">📤 Upload Shapefile (.zip)</button>
        <input type="file" id="shp-upload" accept=".zip" style="display:none" onchange="handleShapefileUpload(event)">
        <button onclick="detectIssues()">🔍 Detect Issues</button>
        <button onclick="runTopologyFixes()">🛠️ Full Topology Fix</button>
        <button onclick="dissolveFeatures()">🔗 Dissolve Overlaps</button>
        <button onclick="exportFixedShapefile()">📦 Export Fixed Shapefile</button>
        <button onclick="Homepage()">📦 Home</button>
        <button onclick="fitWorld()">🌍 Reset View</button>
    </div>
</header>

<div id="container">
    <div id="map"></div>
    <div id="database-panel">
        <div id="panel-header">
            <h3>📊 Loaded Features (<span id="entry-count">0</span>)</h3>
            <button onclick="clearAllData()" class="danger">Clear All</button>
        </div>
        <table id="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Name / ID</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<!-- Issues Sidebar -->
<div id="issues-sidebar" class="sidebar" style="display: none;">
    <h3 style="color: #ff6666; margin-bottom: 15px;">🔍 Detected Issues</h3>
    <div id="issues-list"></div>
    <button onclick="closeIssuesSidebar()" style="margin-top:15px; width:100%;">Close</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== CORE SETUP ======================
let map = L.map('map', { zoomControl: true }).setView([38.6270, -90.1994], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);

let featuresData = [];
let originalShapefileName = "";
let currentGeoJSON = null;

const markerIcon = L.divIcon({
    className: 'item-marker',
    html: '📍',
    iconSize: [32, 32],
    iconAnchor: [16, 16]
});

let featureLayer = L.layerGroup().addTo(map);

// ====================== UTILITIES ======================
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = isError ? '#ff6666' : '#00ff9d';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2800);
}

function fitWorld() {
    map.flyTo([38.6270, -90.1994], 11);
}

// ====================== UPLOAD & DISPLAY ======================
async function handleShapefileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    originalShapefileName = file.name.replace('.zip', '');
    showToast("Parsing shapefile...");

    try {
        const arrayBuffer = await file.arrayBuffer();
        const geojson = await shp(arrayBuffer);
        
        currentGeoJSON = geojson;
        featuresData = Array.isArray(geojson.features) ? geojson.features : [geojson];
        
        loadFeaturesToMap();
        renderTable();
        showToast(`✅ Successfully loaded ${featuresData.length} features`);
    } catch (err) {
        console.error(err);
        showToast("Failed to parse shapefile. Make sure it's a valid .zip", true);
    }
}

function loadFeaturesToMap() {
    featureLayer.clearLayers();
    featuresData.forEach((feature, index) => {
        L.geoJSON(feature, {
            pointToLayer: (_, latlng) => L.marker(latlng, {icon: markerIcon}),
            style: { color: "#00ff9d", weight: 3, opacity: 0.8 }
        }).addTo(featureLayer);
    });
    if (featuresData.length > 0) map.fitBounds(featureLayer.getBounds());
}

// ====================== TABLE ======================
function renderTable() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    featuresData.forEach((f, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${i+1}</td>
            <td>${f.geometry?.type || 'Unknown'}</td>
            <td>${f.properties?.NAME || f.properties?.id || `Feature ${i+1}`}</td>
            <td><span onclick="zoomToFeature(${i}); event.stopImmediatePropagation()" style="color:#00b8ff;cursor:pointer;">🔎 Zoom</span></td>
        `;
        tbody.appendChild(row);
    });
    document.getElementById('entry-count').textContent = featuresData.length;
}

function zoomToFeature(i) {
    map.fitBounds(L.geoJSON(featuresData[i]).getBounds());
}

// ====================== TOPOLOGY OPERATIONS ======================
function runTopologyFixes() {
    if (!featuresData.length) return showToast("No data loaded", true);
    
    showToast("Running full topology fixes...");
    let fixedCount = 0;

    featuresData = featuresData.map(feature => {
        try {
            let processed = turf.cleanCoords(feature);
            processed = turf.simplify(processed, { tolerance: 0.00005, highQuality: true });
            if (turf.kinks(processed).features.length > 0) {
                processed = turf.truncate(processed, { precision: 8 });
            }
            fixedCount++;
            return processed;
        } catch (e) {
            return feature;
        }
    });

    loadFeaturesToMap();
    renderTable();
    showToast(`✅ Topology fixes applied to ${fixedCount} features`);
}

    // ====================== PATROL ======================
function Homepage() {
    window.open('https://jasonharpole-hue.github.io/', '_blank');
}

function dissolveFeatures() {
    if (!featuresData.length) return showToast("No data", true);
    showToast("Dissolving overlapping features...");

    try {
        const collection = turf.featureCollection(featuresData.filter(f => 
            f.geometry?.type.includes("Polygon")
        ));
        
        if (collection.features.length === 0) {
            return showToast("No polygons to dissolve", true);
        }

        const dissolved = turf.union(collection);
        featuresData = Array.isArray(dissolved.features) ? dissolved.features : [dissolved];
        
        loadFeaturesToMap();
        renderTable();
        showToast("✅ Overlaps merged (dissolved)");
    } catch (e) {
        showToast("Dissolve only works well with polygons", true);
    }
}

// ====================== ISSUE DETECTION ======================
function detectIssues() {
    if (!featuresData.length) return showToast("No features loaded", true);
    
    const issues = [];
    featuresData.forEach((f, i) => {
        try {
            if (f.geometry?.type?.includes("Polygon")) {
                const kinks = turf.kinks(f);
                if (kinks.features.length > 0) {
                    issues.push(`Feature ${i+1}: Self-intersections (${kinks.features.length})`);
                }
                if (turf.area(f) < 0.00001) {
                    issues.push(`Feature ${i+1}: Very small / degenerate geometry`);
                }
            }
        } catch(e) {}
    });

    if (issues.length === 0) showToast("✅ No major topology issues detected");
    else showIssues(issues);
}

function showIssues(issues) {
    const container = document.getElementById('issues-list');
    container.innerHTML = issues.map(issue => `<div class="issue-item">• ${issue}</div>`).join('');
    document.getElementById('issues-sidebar').style.display = 'block';
}

function closeIssuesSidebar() {
    document.getElementById('issues-sidebar').style.display = 'none';
}

// ====================== EXPORT ======================
async function exportFixedShapefile() {
    if (!featuresData.length) return showToast("No data to export", true);
    try {
        const geojson = { type: "FeatureCollection", features: featuresData };
        const zipBlob = await shpwrite.zip(geojson);
        
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = `${originalShapefileName || "shapefile"}_fixed.zip`;
        a.click();
        showToast("✅ Fixed shapefile downloaded");
    } catch (e) {
        showToast("Export failed", true);
    }
}

function clearAllData() {
    if (confirm("Clear all loaded features?")) {
        featuresData = [];
        currentGeoJSON = null;
        featureLayer.clearLayers();
        renderTable();
        showToast("All data cleared");
    }
}

// ====================== INIT ======================
fitWorld();
showToast("Ready — Upload a .zip shapefile to begin");
</script>
</body>
</html>
