<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Management System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            background: #1f1f1f;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { 
            background: #333; 
            border-color: #00ff9d;
            transform: translateY(-1px);
        }
        button.active {
            background: #004d26;
            border-color: #00ff9d;
            color: #00ff9d;
        }
        #container { flex: 1; display: flex; flex-direction: column; }
        #map { flex: 1; position: relative; }
        #database-panel {
            height: 340px;
            background: #111;
            border-top: 2px solid #00ff9d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #panel-header {
            padding: 10px 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
            display: block;
        }
        thead { display: block; }
        tbody {
            display: block;
            overflow-y: auto;
            max-height: calc(340px - 52px);
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        th { 
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 10;
            user-select: none;
        }
        th:hover { background: #252525; }
        th.sorted-asc::after { content: " ↑"; }
        th.sorted-desc::after { content: " ↓"; }
        tr:hover { background: #1e3a2f; }
        .delete-btn { color: #ff6666; cursor: pointer; font-size: 18px; }
        .edit-btn { color: #00b8ff; cursor: pointer; margin-right: 8px; }
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.97);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .layer-item {
            padding: 12px 16px;
            margin: 6px 0;
            background: #1e2937;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-item:hover { background: #334155; transform: translateX(4px); }
        .layer-item.active { background: #0f3d2a; border: 1px solid #00ff9d; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff9d;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
        }
        .robot-marker {
            font-size: 28px;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 8px #00ff9d;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">🤖 ROBOT MANAGEMENT SYSTEM</div>
    <div class="controls">
        <button id="add-mode-btn" onclick="toggleAddMode()">🟢 Add Mode: OFF</button>
        <button onclick="addNewEntry()">+ Manual Add</button>
        <button onclick="toggleSidebar()">🗺️ Layers</button>
        <button onclick="exportCSV()">📤 CSV</button>
        <button onclick="exportShapefile()">📦 Shapefile (.zip)</button>
        <button onclick="importCSV()">📥 Import CSV</button>
        <button onclick="fitWorld()">🌍 Reset View</button>
    </div>
</header>

<div id="container">
    <div id="map"></div>
    <div id="database-panel">
        <div id="panel-header">
            <h3>📊 Robot Fleet (<span id="entry-count">0</span> units)</h3>
            <button onclick="clearAllData()" style="background:#3a1a1a; border-color:#ff6666;">Clear All</button>
        </div>
        <table id="data-table">
            <thead>
                <tr>
                    <th data-sort="id">ID</th>
                    <th data-sort="name">Name</th>
                    <th data-sort="lat">Latitude</th>
                    <th data-sort="lng">Longitude</th>
                    <th data-sort="desc">Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="sidebar" class="sidebar" style="display: none;">
    <h3 style="margin-bottom: 15px; color: #00ff9d;">Map Layers</h3>
    <input type="text" id="search" placeholder="Search location..." onkeypress="if(event.key==='Enter') searchLocation()">
   
    <div class="layer-item active" id="layer-osm" onclick="toggleBaseLayer(0)">🌍 OpenStreetMap</div>
    <div class="layer-item" id="layer-sat" onclick="toggleBaseLayer(1)">🛰️ Satellite</div>
   
    <h4 style="margin:20px 0 10px;">Demo Fleet</h4>
    <div onclick="loadDemoData()" style="padding:12px; background:#1e2937; border-radius:8px; cursor:pointer; text-align:center;">Load St. Louis Demo Robots</div>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== MAP SETUP ======================
let map = L.map('map', { zoomControl: true }).setView([38.6270, -90.1994], 11);

let currentLayer;
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
});
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri'
});

osm.addTo(map);
currentLayer = osm;

let markersData = [];
let addModeEnabled = false;

const robotIcon = L.divIcon({
    className: 'robot-marker',
    html: '🤖',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

// ====================== PERSISTENCE ======================
function saveToLocalStorage() {
    try { localStorage.setItem('robot_fleet', JSON.stringify(markersData)); } catch(e) {}
}

function loadFromLocalStorage() {
    try {
        const saved = localStorage.getItem('robot_fleet');
        if (saved) {
            markersData = JSON.parse(saved);
            markersData.forEach(item => addMarkerToMap(item.lat, item.lng, item.name, item.desc));
            renderTable();
        }
    } catch(e) {}
}

// ====================== ADD MODE ======================
function toggleAddMode() {
    addModeEnabled = !addModeEnabled;
    const btn = document.getElementById('add-mode-btn');
    if (addModeEnabled) {
        btn.textContent = "🟢 Add Mode: ON";
        btn.classList.add('active');
        map.getContainer().style.cursor = 'crosshair';
        showToast("Add Mode Enabled — Click on map to deploy robot");
    } else {
        btn.textContent = "🟢 Add Mode: OFF";
        btn.classList.remove('active');
        map.getContainer().style.cursor = '';
        showToast("Add Mode Disabled");
    }
}

// ====================== MARKERS ======================
function addMarkerToMap(lat, lng, name, desc) {
    const marker = L.marker([lat, lng], { icon: robotIcon, riseOnHover: true }).addTo(map);
    marker.bindPopup(`<b>${name}</b><br>${desc || ''}<br><small>Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}</small>`);
    const lastIndex = markersData.length - 1;
    if (lastIndex >= 0) markersData[lastIndex].marker = marker;
}

// ====================== TABLE (unchanged) ======================
function renderTable() { /* ... same as previous ... */ }
let sortColumn = 'id';
let sortDirection = 1;

document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.getAttribute('data-sort');
        if (sortColumn === col) sortDirection *= -1;
        else { sortColumn = col; sortDirection = 1; }
        
        document.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
        th.classList.add(sortDirection === 1 ? 'sorted-asc' : 'sorted-desc');
        sortTable(col, sortDirection);
    });
});

function sortTable(col, direction) { /* ... same as previous ... */ }

// ====================== CRUD ======================
function addNewEntry() {
    const name = prompt("Robot Name:", "Unit-X42");
    if (!name) return;
    const lat = parseFloat(prompt("Latitude:", "38.6270"));
    const lng = parseFloat(prompt("Longitude:", "-90.1994"));
    const desc = prompt("Status / Description:", "Patrolling downtown");
   
    if (isNaN(lat) || isNaN(lng)) return showToast("Invalid coordinates!", true);
   
    markersData.push({ name, lat, lng, desc });
    addMarkerToMap(lat, lng, name, desc);
    renderTable();
    saveToLocalStorage();
    showToast("Robot deployed");
}

function editEntry(index) { /* ... same as previous ... */ }
function deleteEntry(index) { /* ... same as previous ... */ }
function clearAllData() { /* ... same as previous ... */ }

// ====================== CSV / Shapefile (same) ======================
function exportCSV() { /* ... */ }
function importCSV() { /* ... */ }
async function exportShapefile() { /* ... */ }

function downloadFile(content, filename, type = 'application/octet-stream') {
    const blob = content instanceof Blob ? content : new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = isError ? '#ff6666' : '#00ff9d';
    toast.style.color = isError ? '#fff' : '#000';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2800);
}

// ====================== MAP INTERACTIONS ======================
map.on('click', function(e) {
    if (!addModeEnabled) return;
    
    const name = prompt("New Robot Name:", "Unit-" + Math.floor(Math.random()*1000));
    if (!name) return;
    
    const desc = prompt("Status / Description:", "New deployment");
    
    markersData.push({name, lat: e.latlng.lat, lng: e.latlng.lng, desc});
    addMarkerToMap(e.latlng.lat, e.latlng.lng, name, desc);
    renderTable();
    saveToLocalStorage();
    showToast("Robot deployed at clicked location");
});

function toggleBaseLayer(n) { /* ... same ... */ }
async function searchLocation() { /* ... same ... */ }
function toggleSidebar() { /* ... same ... */ }
function fitWorld() { map.flyTo([38.6270, -90.1994], 11); }

function loadDemoData() { /* ... same as previous ... */ }

// ====================== INIT ======================
loadFromLocalStorage();
if (markersData.length === 0) loadDemoData();
</script>
</body>
</html>
