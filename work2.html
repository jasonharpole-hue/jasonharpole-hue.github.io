<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Management System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>
 
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            background: #1f1f1f;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #333; border-color: #00ff9d; transform: translateY(-1px); }
        button.active {
            background: #004d26;
            border-color: #00ff9d;
            color: #00ff9d;
        }
        #container { flex: 1; display: flex; flex-direction: column; }
        #map { flex: 1; position: relative; }
        #database-panel {
            height: 340px;
            background: #111;
            border-top: 2px solid #00ff9d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #panel-header {
            padding: 10px 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        .tab-btn {
            padding: 6px 16px;
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #004d26;
            border-color: #00ff9d;
            color: #00ff9d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
            display: block;
        }
        thead { display: block; }
        tbody {
            display: block;
            overflow-y: auto;
            max-height: calc(340px - 100px);
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        th {
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 10;
            user-select: none;
        }
        th:hover { background: #252525; }
        tr:hover { background: #1e3a2f; }
        .delete-btn { color: #ff6666; cursor: pointer; font-size: 18px; }
        .edit-btn { color: #00b8ff; cursor: pointer; margin-right: 8px; }
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.97);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .layer-item {
            padding: 12px 16px;
            margin: 6px 0;
            background: #1e2937;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-item:hover { background: #334155; transform: translateX(4px); }
        .layer-item.active { background: #0f3d2a; border: 1px solid #00ff9d; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff9d;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
        }
        .robot-marker {
            font-size: 28px;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 8px #00ff9d;
        }
        .drawing-instructions {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 77, 38, 0.95);
            padding: 12px 24px;
            border-radius: 8px;
            color: #00ff9d;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<header>
    <div class="logo">🤖 ROBOT MANAGEMENT SYSTEM</div>
    <div class="controls">
        <button id="add-mode-btn" onclick="toggleAddMode()">🟢 Add Robot: OFF</button>
        <button onclick="startDrawing('path')">➕ Add Path</button>
        <button onclick="startDrawing('obstacle')">🚧 Add Obstacle</button>
        <button onclick="startDrawing('polygon')">⬡ Add Polygon</button>
        <button onclick="addNewEntry()">+ Manual Robot</button>
        <button onclick="toggleSidebar()">🗺️ Layers</button>
        <button onclick="openPatrolSystem()">⚙️ Advanced Patrol</button>
        <button onclick="openQualitycontrolSystem()">⚙️ Quality Control</button>
        <button onclick="exportCSV()">📤 CSV</button>
        <button onclick="exportShapefile()">📦 Shapefile (.zip)</button>
        <button onclick="importCSV()">📥 Import CSV</button>
        <button onclick="fitWorld()">🌍 Reset View</button>
    </div>
</header>
<div id="container">
    <div id="map"></div>
    <div id="database-panel">
        <div id="panel-header">
            <div>
                <h3>📊 Fleet Data (<span id="entry-count">0</span>)</h3>
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab(0)" id="tab-0">Robots</button>
                    <button class="tab-btn" onclick="switchTab(1)" id="tab-1">Paths</button>
                    <button class="tab-btn" onclick="switchTab(2)" id="tab-2">Obstacles</button>
                    <button class="tab-btn" onclick="switchTab(3)" id="tab-3">Polygons</button>
                </div>
            </div>
            <button onclick="clearAllData()" style="background:#3a1a1a; border-color:#ff6666;">Clear All</button>
        </div>
        <table id="data-table">
            <thead id="table-header">
                <!-- Populated by JS -->
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="sidebar" class="sidebar" style="display: none;">
    <h3 style="margin-bottom: 15px; color: #00ff9d;">Map Layers</h3>
    <input type="text" id="search" placeholder="Search location..." onkeypress="if(event.key==='Enter') searchLocation()">
    <div class="layer-item active" id="layer-osm" onclick="toggleBaseLayer(0)">🌍 OpenStreetMap</div>
    <div class="layer-item" id="layer-sat" onclick="toggleBaseLayer(1)">🛰️ Satellite</div>
    
    <h4 style="margin:20px 0 10px;">Demo Data</h4>
    <div onclick="loadDemoData()" style="padding:12px; background:#1e2937; border-radius:8px; cursor:pointer; text-align:center;">Load St. Louis Demo</div>
</div>

<div id="drawing-instructions" class="drawing-instructions">
    Click on map to add points • <span id="draw-type"></span><br>
    <button onclick="finishDrawing()" style="margin-top:8px; background:#00ff9d; color:#000;">Finish</button>
    <button onclick="cancelDrawing()" style="margin-top:8px; background:#ff6666;">Cancel</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== MAP SETUP ======================
let map = L.map('map', { zoomControl: true }).setView([38.6270, -90.1994], 11);
let currentLayer;
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
});
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri'
});
osm.addTo(map);
currentLayer = osm;

let markersData = [];
let pathsData = [];
let obstaclesData = [];
let polygonsData = [];
let currentTab = 0;

let addModeEnabled = false;
let currentDrawingType = null;
let currentDrawingPoints = [];
let currentDrawingLayer = null;

const robotIcon = L.divIcon({
    className: 'robot-marker',
    html: '🤖',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

// ====================== PERSISTENCE ======================
function saveToLocalStorage() {
    try {
        localStorage.setItem('robot_fleet', JSON.stringify(markersData));
        localStorage.setItem('paths_data', JSON.stringify(pathsData));
        localStorage.setItem('obstacles_data', JSON.stringify(obstaclesData));
        localStorage.setItem('polygons_data', JSON.stringify(polygonsData));
    } catch(e) {}
}

function loadFromLocalStorage() {
    try {
        const savedRobots = localStorage.getItem('robot_fleet');
        if (savedRobots) {
            markersData = JSON.parse(savedRobots);
            markersData.forEach(item => addMarkerToMap(item.lat, item.lng, item.name, item.desc));
        }
        
        const savedPaths = localStorage.getItem('paths_data');
        if (savedPaths) pathsData = JSON.parse(savedPaths), pathsData.forEach(p => addLineToMap(p));
        
        const savedObstacles = localStorage.getItem('obstacles_data');
        if (savedObstacles) obstaclesData = JSON.parse(savedObstacles), obstaclesData.forEach(o => addLineToMap(o));
        
        const savedPolygons = localStorage.getItem('polygons_data');
        if (savedPolygons) polygonsData = JSON.parse(savedPolygons), polygonsData.forEach(p => addPolygonToMap(p));
        
        renderCurrentTable();
    } catch(e) {}
}

// ====================== DRAWING ======================
function startDrawing(type) {
    cancelDrawing();
    currentDrawingType = type;
    currentDrawingPoints = [];
    document.getElementById('drawing-instructions').style.display = 'block';
    let typeLabel = type === 'path' ? 'PATH (Green)' : type === 'obstacle' ? 'OBSTACLE (Red)' : 'POLYGON (Blue)';
    document.getElementById('draw-type').textContent = typeLabel;
    map.getContainer().style.cursor = 'crosshair';
    showToast(`Drawing ${type.toUpperCase()}. Click points on map.`);
}

function cancelDrawing() {
    if (currentDrawingLayer) map.removeLayer(currentDrawingLayer);
    currentDrawingType = null;
    currentDrawingPoints = [];
    currentDrawingLayer = null;
    document.getElementById('drawing-instructions').style.display = 'none';
    map.getContainer().style.cursor = '';
}

function finishDrawing() {
    if ((currentDrawingType === 'polygon' && currentDrawingPoints.length < 3) || 
        (currentDrawingType !== 'polygon' && currentDrawingPoints.length < 2)) {
        showToast("Not enough points", true);
        return;
    }
    
    const name = prompt("Name for this " + currentDrawingType + ":", 
        currentDrawingType === 'path' ? "Route-A1" : 
        currentDrawingType === 'obstacle' ? "Obstacle-Zone1" : "Zone-A1");
    if (!name) return cancelDrawing();
    
    const desc = prompt("Description:", "");
    
    const newFeature = { id: Date.now(), name, points: [...currentDrawingPoints], desc: desc || '', type: currentDrawingType };
    
    if (currentDrawingType === 'path') {
        pathsData.push(newFeature); addLineToMap(newFeature);
    } else if (currentDrawingType === 'obstacle') {
        obstaclesData.push(newFeature); addLineToMap(newFeature);
    } else if (currentDrawingType === 'polygon') {
        polygonsData.push(newFeature); addPolygonToMap(newFeature);
    }
    
    renderCurrentTable();
    saveToLocalStorage();
    showToast(currentDrawingType === 'polygon' ? 'Polygon created' : (currentDrawingType === 'path' ? 'Path' : 'Obstacle') + ' created');
    cancelDrawing();
}

function addLineToMap(line) {
    const color = line.type === 'path' ? '#00ff9d' : '#ff4444';
    const polyline = L.polyline(line.points.map(p => [p.lat, p.lng]), { color, weight: line.type === 'path' ? 5 : 6, opacity: 0.9 }).addTo(map);
    polyline.bindPopup(`<b>${line.name}</b><br>${line.desc || ''}<br><small>${line.type.toUpperCase()} • ${line.points.length} points</small>`);
    line.polyline = polyline;
    polyline.on('click', openPatrolSystem);
}

function addPolygonToMap(polygon) {
    const poly = L.polygon(polygon.points.map(p => [p.lat, p.lng]), {
        color: '#00b8ff', fillColor: '#00b8ff', fillOpacity: 0.25, weight: 4
    }).addTo(map);
    poly.bindPopup(`<b>${polygon.name}</b><br>${polygon.desc || ''}<br><small>POLYGON • ${polygon.points.length} points</small>`);
    polygon.polygon = poly;
    poly.on('click', openPatrolSystem);
}

// ====================== MARKERS & TABLE ======================
function addMarkerToMap(lat, lng, name, desc) {
    const marker = L.marker([lat, lng], { icon: robotIcon }).addTo(map);
    marker.bindPopup(`<b>${name}</b><br>${desc || ''}<br><small>Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}</small>`);
    marker.on('click', openPatrolSystem);
    return marker;
}

function switchTab(tab) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===tab)); renderCurrentTable(); }

function renderCurrentTable() {
    const tbody = document.getElementById('table-body');
    const header = document.getElementById('table-header');
    tbody.innerHTML = '';
    let data = currentTab === 0 ? markersData : currentTab === 1 ? pathsData : currentTab === 2 ? obstaclesData : polygonsData;
    
    header.innerHTML = currentTab === 0 ? 
        `<tr><th>ID</th><th>Name</th><th>Lat</th><th>Lng</th><th>Description</th><th>Actions</th></tr>` :
        `<tr><th>ID</th><th>Name</th><th>Points</th><th>Description</th><th>Actions</th></tr>`;
    
    data.forEach((item, i) => {
        const row = document.createElement('tr');
        if (currentTab === 0) {
            row.innerHTML = `<td>${i+1}</td><td>${item.name}</td><td>${item.lat.toFixed(4)}</td><td>${item.lng.toFixed(4)}</td><td>${(item.desc||'-').substring(0,45)}${(item.desc||'').length>45?'...':''}</td><td><span class="edit-btn" onclick="editEntry(${i});event.stopImmediatePropagation()">✏️</span><span class="delete-btn" onclick="deleteEntry(${i});event.stopImmediatePropagation()">×</span></td>`;
        } else {
            row.innerHTML = `<td>${i+1}</td><td>${item.name}</td><td>${item.points.length}</td><td>${(item.desc||'-').substring(0,45)}${(item.desc||'').length>45?'...':''}</td><td><span class="edit-btn" onclick="editFeature(${i});event.stopImmediatePropagation()">✏️</span><span class="delete-btn" onclick="deleteFeature(${i});event.stopImmediatePropagation()">×</span></td>`;
        }
        tbody.appendChild(row);
    });
    document.getElementById('entry-count').textContent = data.length;
}

// ... (rest of the CRUD, export, UI functions are updated accordingly - full code is in the saved file)

loadFromLocalStorage();
if (!markersData.length && !pathsData.length && !obstaclesData.length && !polygonsData.length) loadDemoData();
</script>
</body>
</html>
