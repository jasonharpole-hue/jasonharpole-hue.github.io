<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Management System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>
 
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            background: #1f1f1f;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #333; border-color: #00ff9d; transform: translateY(-1px); }
        button.active {
            background: #004d26;
            border-color: #00ff9d;
            color: #00ff9d;
        }
        #container { flex: 1; display: flex; flex-direction: column; }
        #map { flex: 1; position: relative; }
        #database-panel {
            height: 340px;
            background: #111;
            border-top: 2px solid #00ff9d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #panel-header {
            padding: 10px 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        .tab-btn {
            padding: 6px 16px;
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #004d26;
            border-color: #00ff9d;
            color: #00ff9d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
            display: block;
        }
        thead { display: block; }
        tbody {
            display: block;
            overflow-y: auto;
            max-height: calc(340px - 100px);
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        th {
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 10;
            user-select: none;
        }
        th:hover { background: #252525; }
        th.sorted-asc::after { content: " ↑"; }
        th.sorted-desc::after { content: " ↓"; }
        tr:hover { background: #1e3a2f; }
        .delete-btn { color: #ff6666; cursor: pointer; font-size: 18px; }
        .edit-btn { color: #00b8ff; cursor: pointer; margin-right: 8px; }
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.97);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .layer-item {
            padding: 12px 16px;
            margin: 6px 0;
            background: #1e2937;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-item:hover { background: #334155; transform: translateX(4px); }
        .layer-item.active { background: #0f3d2a; border: 1px solid #00ff9d; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff9d;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
        }
        .robot-marker {
            font-size: 28px;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 8px #00ff9d;
        }
        .drawing-instructions {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 77, 38, 0.95);
            padding: 12px 24px;
            border-radius: 8px;
            color: #00ff9d;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<header>
    <div class="logo">🤖 ROBOT MANAGEMENT SYSTEM</div>
    <div class="controls">
        <button id="add-mode-btn" onclick="toggleAddMode()">🟢 Add Robot: OFF</button>
        <button onclick="startDrawing('path')">➕ Add Path</button>
        <button onclick="startDrawing('obstacle')">🚧 Add Obstacle</button>
        <button onclick="addNewEntry()">+ Manual Robot</button>
        <button onclick="toggleSidebar()">🗺️ Layers</button>
        <button onclick="openPatrolSystem()">⚙️ Advanced Patrol</button>
        <button onclick="openQualitycontrolSystem()">⚙️ Quality Control</button>
        <button onclick="exportCSV()">📤 CSV</button>
        <button onclick="exportShapefile()">📦 Shapefile (.zip)</button>
        <button onclick="importCSV()">📥 Import CSV</button>
        <button onclick="fitWorld()">🌍 Reset View</button>
    </div>
</header>
<div id="container">
    <div id="map"></div>
    <div id="database-panel">
        <div id="panel-header">
            <div>
                <h3>📊 Fleet Data (<span id="entry-count">0</span>)</h3>
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab(0)" id="tab-0">Robots</button>
                    <button class="tab-btn" onclick="switchTab(1)" id="tab-1">Paths</button>
                    <button class="tab-btn" onclick="switchTab(2)" id="tab-2">Obstacles</button>
                </div>
            </div>
            <button onclick="clearAllData()" style="background:#3a1a1a; border-color:#ff6666;">Clear All</button>
        </div>
        <table id="data-table">
            <thead id="table-header">
                <!-- Populated by JS -->
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="sidebar" class="sidebar" style="display: none;">
    <h3 style="margin-bottom: 15px; color: #00ff9d;">Map Layers</h3>
    <input type="text" id="search" placeholder="Search location..." onkeypress="if(event.key==='Enter') searchLocation()">
    <div class="layer-item active" id="layer-osm" onclick="toggleBaseLayer(0)">🌍 OpenStreetMap</div>
    <div class="layer-item" id="layer-sat" onclick="toggleBaseLayer(1)">🛰️ Satellite</div>
    
    <h4 style="margin:20px 0 10px;">Demo Data</h4>
    <div onclick="loadDemoData()" style="padding:12px; background:#1e2937; border-radius:8px; cursor:pointer; text-align:center;">Load St. Louis Demo</div>
</div>

<div id="drawing-instructions" class="drawing-instructions">
    Click on map to add points • <span id="draw-type"></span><br>
    <button onclick="finishDrawing()" style="margin-top:8px; background:#00ff9d; color:#000;">Finish Line</button>
    <button onclick="cancelDrawing()" style="margin-top:8px; background:#ff6666;">Cancel</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== MAP SETUP ======================
let map = L.map('map', { zoomControl: true }).setView([38.6270, -90.1994], 11);
let currentLayer;
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
});
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri'
});
osm.addTo(map);
currentLayer = osm;

let markersData = [];
let pathsData = [];
let obstaclesData = [];
let currentTab = 0; // 0: robots, 1: paths, 2: obstacles

let addModeEnabled = false;
let currentDrawingType = null;
let currentDrawingPoints = [];
let currentDrawingPolyline = null;

const robotIcon = L.divIcon({
    className: 'robot-marker',
    html: '🤖',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

// ====================== PERSISTENCE ======================
function saveToLocalStorage() {
    try {
        localStorage.setItem('robot_fleet', JSON.stringify(markersData));
        localStorage.setItem('paths_data', JSON.stringify(pathsData));
        localStorage.setItem('obstacles_data', JSON.stringify(obstaclesData));
    } catch(e) {}
}

function loadFromLocalStorage() {
    try {
        const savedRobots = localStorage.getItem('robot_fleet');
        if (savedRobots) {
            markersData = JSON.parse(savedRobots);
            markersData.forEach(item => addMarkerToMap(item.lat, item.lng, item.name, item.desc));
        }
        
        const savedPaths = localStorage.getItem('paths_data');
        if (savedPaths) {
            pathsData = JSON.parse(savedPaths);
            pathsData.forEach(p => addLineToMap(p));
        }
        
        const savedObstacles = localStorage.getItem('obstacles_data');
        if (savedObstacles) {
            obstaclesData = JSON.parse(savedObstacles);
            obstaclesData.forEach(o => addLineToMap(o));
        }
        
        renderCurrentTable();
    } catch(e) {}
}

// ====================== DRAWING ======================
function startDrawing(type) {
    cancelDrawing();
    currentDrawingType = type;
    currentDrawingPoints = [];
    document.getElementById('drawing-instructions').style.display = 'block';
    document.getElementById('draw-type').textContent = type === 'path' ? 'PATH (Green)' : 'OBSTACLE (Red)';
    map.getContainer().style.cursor = 'crosshair';
    showToast(`Drawing ${type.toUpperCase()}. Click points on map.`);
}

function cancelDrawing() {
    if (currentDrawingPolyline) {
        map.removeLayer(currentDrawingPolyline);
    }
    currentDrawingType = null;
    currentDrawingPoints = [];
    currentDrawingPolyline = null;
    document.getElementById('drawing-instructions').style.display = 'none';
    map.getContainer().style.cursor = '';
}

function finishDrawing() {
    if (currentDrawingPoints.length < 2) {
        showToast("Need at least 2 points", true);
        return;
    }
    
    const name = prompt("Name for this " + currentDrawingType + ":", currentDrawingType === 'path' ? "Route-A1" : "Obstacle-Zone1");
    if (!name) {
        cancelDrawing();
        return;
    }
    
    const desc = prompt("Description:", "");
    
    const newLine = {
        id: Date.now(),
        name: name,
        points: [...currentDrawingPoints],
        desc: desc || '',
        type: currentDrawingType
    };
    
    if (currentDrawingType === 'path') {
        pathsData.push(newLine);
    } else {
        obstaclesData.push(newLine);
    }
    
    addLineToMap(newLine);
    renderCurrentTable();
    saveToLocalStorage();
    showToast(`${currentDrawingType === 'path' ? 'Path' : 'Obstacle'} created`);
    cancelDrawing();
}

function addLineToMap(line) {
    const color = line.type === 'path' ? '#00ff9d' : '#ff4444';
    const weight = line.type === 'path' ? 5 : 6;
    
    const polyline = L.polyline(line.points.map(p => [p.lat, p.lng]), {
        color: color,
        weight: weight,
        opacity: 0.9
    }).addTo(map);
    
    polyline.bindPopup(`<b>${line.name}</b><br>${line.desc || ''}<br><small>${line.type.toUpperCase()} • ${line.points.length} points</small>`);
    
    line.polyline = polyline;
    
    // Click to open patrol
    polyline.on('click', () => {
        openPatrolSystem();
    });
}

// ====================== MARKERS ======================
function addMarkerToMap(lat, lng, name, desc) {
    const marker = L.marker([lat, lng], { icon: robotIcon, riseOnHover: true }).addTo(map);
    marker.bindPopup(`<b>${name}</b><br>${desc || ''}<br><small>Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}</small>`);
    marker.on('click', () => openPatrolSystem());
    return marker;
}

// ====================== TABLE ======================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === tab);
    });
    renderCurrentTable();
}

function renderCurrentTable() {
    const tbody = document.getElementById('table-body');
    const header = document.getElementById('table-header');
    tbody.innerHTML = '';
    
    let data = [];
    let columns = [];
    
    if (currentTab === 0) { // Robots
        data = markersData;
        columns = ['ID', 'Name', 'Lat', 'Lng', 'Description', 'Actions'];
        header.innerHTML = `
            <tr>
                <th data-sort="id">ID</th>
                <th data-sort="name">Name</th>
                <th data-sort="lat">Latitude</th>
                <th data-sort="lng">Longitude</th>
                <th data-sort="desc">Description</th>
                <th>Actions</th>
            </tr>
        `;
    } else if (currentTab === 1) { // Paths
        data = pathsData;
        columns = ['ID', 'Name', 'Points', 'Description', 'Actions'];
        header.innerHTML = `
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Points</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        `;
    } else { // Obstacles
        data = obstaclesData;
        columns = ['ID', 'Name', 'Points', 'Description', 'Actions'];
        header.innerHTML = `
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Points</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        `;
    }
    
    data.forEach((item, index) => {
        const row = document.createElement('tr');
        if (currentTab === 0) {
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.lat.toFixed(4)}</td>
                <td>${item.lng.toFixed(4)}</td>
                <td>${item.desc ? item.desc.substring(0, 45) + (item.desc.length > 45 ? '...' : '') : '-'}</td>
                <td>
                    <span class="edit-btn" onclick="editEntry(${index}); event.stopImmediatePropagation()">✏️</span>
                    <span class="delete-btn" onclick="deleteEntry(${index}); event.stopImmediatePropagation()">×</span>
                </td>
            `;
            row.onclick = () => openPatrolSystem();
        } else {
            const pointsCount = item.points.length;
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${pointsCount}</td>
                <td>${item.desc ? item.desc.substring(0, 45) + (item.desc.length > 45 ? '...' : '') : '-'}</td>
                <td>
                    <span class="edit-btn" onclick="editLine(${index}); event.stopImmediatePropagation()">✏️</span>
                    <span class="delete-btn" onclick="deleteLine(${index}); event.stopImmediatePropagation()">×</span>
                </td>
            `;
            row.onclick = () => openPatrolSystem();
        }
        tbody.appendChild(row);
    });
    
    document.getElementById('entry-count').textContent = data.length;
}

// Sorting (only for robots for simplicity)
let sortColumn = 'id';
let sortDirection = 1;

// ====================== CRUD ======================
function addNewEntry() {
    const name = prompt("Robot Name:", "Unit-X42");
    if (!name) return;
    const lat = parseFloat(prompt("Latitude:", "38.6270"));
    const lng = parseFloat(prompt("Longitude:", "-90.1994"));
    const desc = prompt("Status / Description:", "Patrolling downtown");
    if (isNaN(lat) || isNaN(lng)) return showToast("Invalid coordinates!", true);
   
    const newRobot = { name, lat, lng, desc };
    markersData.push(newRobot);
    newRobot.marker = addMarkerToMap(lat, lng, name, desc);
   
    renderCurrentTable();
    saveToLocalStorage();
    showToast("Robot deployed");
}

function editEntry(index) {
    const item = markersData[index];
    if (!item) return;
   
    const name = prompt("Edit Robot Name:", item.name);
    if (name === null) return;
    const lat = parseFloat(prompt("Latitude:", item.lat));
    const lng = parseFloat(prompt("Longitude:", item.lng));
    const desc = prompt("Description / Status:", item.desc || "");
   
    if (isNaN(lat) || isNaN(lng)) return showToast("Invalid coordinates!", true);
    
    item.name = name;
    item.lat = lat;
    item.lng = lng;
    item.desc = desc;
    
    // Refresh markers
    markersData.forEach(m => { if (m.marker) map.removeLayer(m.marker); });
    markersData.forEach(m => { m.marker = addMarkerToMap(m.lat, m.lng, m.name, m.desc); });
   
    renderCurrentTable();
    saveToLocalStorage();
    showToast("Robot updated");
}

function deleteEntry(index) {
    if (confirm("Decommission this robot?")) {
        if (markersData[index].marker) map.removeLayer(markersData[index].marker);
        markersData.splice(index, 1);
        renderCurrentTable();
        saveToLocalStorage();
        showToast("Robot decommissioned");
    }
}

function editLine(index) {
    const isPath = currentTab === 1;
    const data = isPath ? pathsData : obstaclesData;
    const item = data[index];
    if (!item) return;
    
    const name = prompt("Edit Name:", item.name);
    if (name === null) return;
    const desc = prompt("Description:", item.desc || "");
    
    item.name = name;
    item.desc = desc;
    
    // Re-add line
    if (item.polyline) map.removeLayer(item.polyline);
    addLineToMap(item);
    
    renderCurrentTable();
    saveToLocalStorage();
    showToast("Line updated");
}

function deleteLine(index) {
    const isPath = currentTab === 1;
    const data = isPath ? pathsData : obstaclesData;
    if (confirm(`Remove this ${isPath ? 'path' : 'obstacle'}?`)) {
        if (data[index].polyline) map.removeLayer(data[index].polyline);
        data.splice(index, 1);
        renderCurrentTable();
        saveToLocalStorage();
        showToast("Line removed");
    }
}

function clearAllData() {
    if (confirm("Clear ALL data (robots, paths, obstacles)?")) {
        markersData.forEach(item => { if (item.marker) map.removeLayer(item.marker); });
        pathsData.forEach(item => { if (item.polyline) map.removeLayer(item.polyline); });
        obstaclesData.forEach(item => { if (item.polyline) map.removeLayer(item.polyline); });
        
        markersData = [];
        pathsData = [];
        obstaclesData = [];
        
        renderCurrentTable();
        saveToLocalStorage();
        showToast("All data cleared");
    }
}

// ====================== CSV & SHAPEFILE ======================
function exportCSV() {
    if (!markersData.length && !pathsData.length && !obstaclesData.length) {
        return showToast("No data to export!", true);
    }
    
    let csv = "Type,ID,Name,Latitude/LngList,Description\n";
    
    markersData.forEach((item, i) => {
        csv += `Robot,${i+1},"${item.name.replace(/"/g, '""')}",${item.lat},${item.lng},"${(item.desc || '').replace(/"/g, '""')}"\n`;
    });
    
    pathsData.forEach((item, i) => {
        const coords = item.points.map(p => `${p.lat},${p.lng}`).join('|');
        csv += `Path,${i+1},"${item.name.replace(/"/g, '""')}","${coords}","${(item.desc || '').replace(/"/g, '""')}"\n`;
    });
    
    obstaclesData.forEach((item, i) => {
        const coords = item.points.map(p => `${p.lat},${p.lng}`).join('|');
        csv += `Obstacle,${i+1},"${item.name.replace(/"/g, '""')}","${coords}","${(item.desc || '').replace(/"/g, '""')}"\n`;
    });
    
    downloadFile(csv, `fleet_data_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
}

async function exportShapefile() {
    if (!markersData.length && !pathsData.length && !obstaclesData.length) {
        return showToast("No data to export!", true);
    }
    
    try {
        showToast("Generating Shapefile...");
        
        const geojsonFeatures = [];
        
        // Robots as points
        markersData.forEach((item, index) => {
            geojsonFeatures.push({
                type: "Feature",
                geometry: { type: "Point", coordinates: [item.lng, item.lat] },
                properties: { Type: "Robot", ID: index + 1, Name: item.name, Description: item.desc || "" }
            });
        });
        
        // Paths & Obstacles as LineStrings
        pathsData.forEach((item, index) => {
            geojsonFeatures.push({
                type: "Feature",
                geometry: { 
                    type: "LineString", 
                    coordinates: item.points.map(p => [p.lng, p.lat]) 
                },
                properties: { Type: "Path", ID: index + 1, Name: item.name, Description: item.desc || "" }
            });
        });
        
        obstaclesData.forEach((item, index) => {
            geojsonFeatures.push({
                type: "Feature",
                geometry: { 
                    type: "LineString", 
                    coordinates: item.points.map(p => [p.lng, p.lat]) 
                },
                properties: { Type: "Obstacle", ID: index + 1, Name: item.name, Description: item.desc || "" }
            });
        });
        
        const geojson = {
            type: "FeatureCollection",
            features: geojsonFeatures
        };
        
        const zipBlob = await shpwrite.zip(geojson, { folder: "Robot_Fleet", types: { point: "points", line: "lines" } });
        downloadFile(zipBlob, `fleet_data_${new Date().toISOString().slice(0,10)}.zip`);
        showToast("Shapefile exported!");
    } catch (err) {
        console.error(err);
        showToast("Failed to create Shapefile", true);
    }
}

function downloadFile(content, filename, type = 'application/octet-stream') {
    const blob = content instanceof Blob ? content : new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

function importCSV() {
    showToast("Import feature coming soon...", true);
}

// ====================== UI ======================
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = isError ? '#ff6666' : '#00ff9d';
    toast.style.color = isError ? '#fff' : '#000';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2800);
}

function toggleAddMode() {
    addModeEnabled = !addModeEnabled;
    const btn = document.getElementById('add-mode-btn');
    if (addModeEnabled) {
        btn.textContent = "🟢 Add Robot: ON";
        btn.classList.add('active');
        map.getContainer().style.cursor = 'crosshair';
        showToast("Click on map to deploy robot");
    } else {
        btn.textContent = "🟢 Add Robot: OFF";
        btn.classList.remove('active');
        map.getContainer().style.cursor = '';
        showToast("Add Robot Mode Disabled");
    }
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.style.display = sb.style.display === 'none' ? 'block' : 'none';
}

function fitWorld() {
    map.flyTo([38.6270, -90.1994], 11);
}

function loadDemoData() {
    // Clear existing
    markersData.forEach(item => { if (item.marker) map.removeLayer(item.marker); });
    pathsData.forEach(item => { if (item.polyline) map.removeLayer(item.polyline); });
    obstaclesData.forEach(item => { if (item.polyline) map.removeLayer(item.polyline); });
    
    markersData = [];
    pathsData = [];
    obstaclesData = [];
    
    // Demo robots
    const samples = [
        {name: "R-Alpha", lat: 38.6270, lng: -90.1994, desc: "Downtown Patrol"},
        {name: "R-Beta", lat: 38.6350, lng: -90.2100, desc: "Forest Park"}
    ];
    samples.forEach(s => {
        markersData.push(s);
        s.marker = addMarkerToMap(s.lat, s.lng, s.name, s.desc);
    });
    
    // Demo Path
    const demoPath = {
        id: Date.now(),
        name: "Main Patrol Route",
        points: [
            {lat: 38.6270, lng: -90.1994},
            {lat: 38.6350, lng: -90.2100},
            {lat: 38.6400, lng: -90.1950}
        ],
        desc: "Primary patrol loop",
        type: 'path'
    };
    pathsData.push(demoPath);
    addLineToMap(demoPath);
    
    // Demo Obstacle
    const demoObstacle = {
        id: Date.now() + 1,
        name: "Construction Zone",
        points: [
            {lat: 38.6150, lng: -90.1850},
            {lat: 38.6180, lng: -90.1920}
        ],
        desc: "Road blocked",
        type: 'obstacle'
    };
    obstaclesData.push(demoObstacle);
    addLineToMap(demoObstacle);
    
    renderCurrentTable();
    saveToLocalStorage();
    showToast("Demo data loaded");
}

// Map interactions
map.on('click', function(e) {
    if (addModeEnabled) {
        const name = prompt("New Robot Name:", "Unit-" + Math.floor(Math.random()*1000));
        if (!name) return;
        const desc = prompt("Status / Description:", "New deployment");
        
        const newRobot = {name, lat: e.latlng.lat, lng: e.latlng.lng, desc};
        markersData.push(newRobot);
        newRobot.marker = addMarkerToMap(e.latlng.lat, e.latlng.lng, name, desc);
       
        renderCurrentTable();
        saveToLocalStorage();
        showToast("Robot deployed");
    } 
    else if (currentDrawingType) {
        currentDrawingPoints.push({lat: e.latlng.lat, lng: e.latlng.lng});
        
        if (currentDrawingPolyline) {
            map.removeLayer(currentDrawingPolyline);
        }
        
        currentDrawingPolyline = L.polyline(currentDrawingPoints.map(p => [p.lat, p.lng]), {
            color: currentDrawingType === 'path' ? '#00ff9d' : '#ff4444',
            weight: 5,
            dashArray: currentDrawingType === 'obstacle' ? '8, 5' : null
        }).addTo(map);
    }
});

// Base layer toggle
function toggleBaseLayer(n) {
    map.removeLayer(currentLayer);
    currentLayer = n === 0 ? osm : satellite;
    currentLayer.addTo(map);
    document.getElementById('layer-osm').classList.toggle('active', n === 0);
    document.getElementById('layer-sat').classList.toggle('active', n === 1);
}

function searchLocation() {
    showToast("Search functionality coming soon...", true);
}

// ====================== PATROL ======================
function openPatrolSystem() {
    window.open('https://jasonharpole-hue.github.io/patrol.html', '_blank');
}

function openQualitycontrolSystem() {
    window.open('https://jasonharpole-hue.github.io/qualitycontrol.html', '_blank');
}

// ====================== INIT ======================
loadFromLocalStorage();
if (markersData.length === 0 && pathsData.length === 0 && obstaclesData.length === 0) {
    loadDemoData();
}
</script>
