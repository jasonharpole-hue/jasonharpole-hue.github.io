<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Management GIS - Fixed</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: rgba(0,0,0,0.95); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .logo { font-size: 26px; font-weight: bold; background: linear-gradient(90deg, #00ff9d, #00b8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button { background: #1f1f1f; color: white; border: 1px solid #444; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #333; border-color: #00ff9d; }
        button.active { background: #004d26; border-color: #00ff9d; color: #00ff9d; }
        #map { flex: 1; position: relative; }
        #database-panel { height: 340px; background: #111; border-top: 2px solid #00ff9d; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; flex: 1; display: block; }
        thead { display: block; }
        tbody { display: block; overflow-y: auto; max-height: calc(340px - 52px); }
        th, td { padding: 10px 12px; border-bottom: 1px solid #333; }
        th { background: #1a1a1a; position: sticky; top: 0; }
        .sidebar { position: absolute; top: 20px; right: 20px; width: 340px; background: rgba(15,23,42,0.97); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid #334155; }
        .layer-item { padding: 12px 16px; margin: 6px 0; background: #1e2937; border-radius: 8px; cursor: pointer; }
        .layer-item.active { background: #0f3d2a; border: 1px solid #00ff9d; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; z-index: 2000; display: none; font-weight: 500; }
        .robot-marker { font-size: 28px; line-height: 1; text-shadow: 0 0 8px #00ff9d; }
    </style>
</head>
<body>
<header>
    <div class="logo">🤖 ROBOT MANAGEMENT GIS</div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button id="draw-btn" onclick="toggleDrawControl()" class="active">✏️ Draw Tools (ON)</button>
        <button onclick="addManualPoint()">📍 Add Point</button>
        <button onclick="toggleLayerPanel()">🗺️ Layers</button>
        <button onclick="exportGeoJSON()">📤 GeoJSON</button>
        <button onclick="exportShapefile()">📦 Shapefile</button>
    </div>
</header>

<div id="map"></div>

<div id="database-panel">
    <div style="padding:10px 20px; background:#1a1a1a; display:flex; justify-content:space-between;">
        <h3>Features (<span id="entry-count">0</span>)</h3>
        <button onclick="loadDemoData()">Load Demo</button>
    </div>
    <table id="data-table">
        <thead><tr><th>Type</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== SETUP ======================
const map = L.map('map').setView([38.6270, -90.1994], 11);
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);

const drawnItems = new L.FeatureGroup().addTo(map);
let features = [];
let drawControl = null;

const robotIcon = L.divIcon({className: 'robot-marker', html: '🤖', iconSize: [32,32], iconAnchor: [16,16]});

// ====================== DRAW CONTROL ======================
function toggleDrawControl() {
    const btn = document.getElementById('draw-btn');
    if (drawControl) {
        map.removeControl(drawControl);
        drawControl = null;
        btn.textContent = "✏️ Draw Tools (OFF)";
        btn.classList.remove('active');
    } else {
        drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                marker: { icon: robotIcon },
                polyline: { shapeOptions: { color: '#00b8ff' }},
                polygon: { shapeOptions: { color: '#00ff9d', fillOpacity: 0.3 }},
                rectangle: false, circle: false, circlemarker: false
            },
            edit: { featureGroup: drawnItems }
        });
        map.addControl(drawControl);
        btn.textContent = "✏️ Draw Tools (ON)";
        btn.classList.add('active');
    }
}

// Main drawing handler
map.on('draw:created', function(e) {
    console.log("✅ Shape created!", e.layerType); // Debug
    const layer = e.layer;
    drawnItems.addLayer(layer);

    const geo = layer.toGeoJSON();
    geo.properties = {
        name: prompt("Name for this " + e.layerType + ":", "New Feature") || "Untitled",
        desc: prompt("Description:", "Active") || ""
    };

    features.push(geo);
    refreshLayers();
    renderTable();
    saveToLocalStorage();
    showToast("✅ " + e.layerType + " added successfully");
});

map.on('draw:edited', () => { refreshLayers(); saveToLocalStorage(); });
map.on('draw:deleted', () => { refreshLayers(); saveToLocalStorage(); });

// ====================== MANUAL FALLBACK ======================
function addManualPoint() {
    const lat = parseFloat(prompt("Latitude (e.g. 38.6270):", "38.6270"));
    const lng = parseFloat(prompt("Longitude (e.g. -90.1994):", "-90.1994"));
    if (isNaN(lat) || isNaN(lng)) return showToast("Invalid coordinates", true);

    const geo = {
        type: "Feature",
        geometry: { type: "Point", coordinates: [lng, lat] },
        properties: { name: prompt("Name:", "New Point") || "Manual Point", desc: "Added manually" }
    };
    features.push(geo);
    refreshLayers();
    renderTable();
    saveToLocalStorage();
    showToast("Point added");
}

// ====================== REFRESH ======================
function refreshLayers() {
    drawnItems.clearLayers();
    features.forEach(f => {
        let layer;
        if (f.geometry.type === "Point") {
            layer = L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {icon: robotIcon});
        } else if (f.geometry.type === "LineString") {
            layer = L.polyline(f.geometry.coordinates.map(c => [c[1], c[0]]), {color: "#00b8ff"});
        } else if (f.geometry.type === "Polygon") {
            layer = L.polygon(f.geometry.coordinates[0].map(c => [c[1], c[0]]), {color: "#00ff9d", fillOpacity: 0.25});
        }
        if (layer) {
            layer.bindPopup(`<b>${f.properties.name}</b><br>${f.properties.desc}`);
            drawnItems.addLayer(layer);
        }
    });
}

function renderTable() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    features.forEach((f, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${f.geometry.type}</td>
            <td>${f.properties.name}</td>
            <td>${f.properties.desc.substring(0,40)}...</td>
            <td><span onclick="deleteFeature(${i})" style="color:#ff6666;cursor:pointer">×</span></td>
        `;
        tbody.appendChild(row);
    });
    document.getElementById('entry-count').textContent = features.length;
}

function deleteFeature(i) {
    if (confirm("Delete?")) {
        features.splice(i, 1);
        refreshLayers();
        renderTable();
        saveToLocalStorage();
    }
}

// Storage
function saveToLocalStorage() { localStorage.setItem('robot_gis', JSON.stringify(features)); }
function loadFromLocalStorage() {
    const saved = localStorage.getItem('robot_gis');
    if (saved) features = JSON.parse(saved);
}

// Export functions (same as before)
function exportGeoJSON() {
    if (!features.length) return showToast("No data", true);
    const data = JSON.stringify({type:"FeatureCollection", features}, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "features.geojson"; a.click();
}

async function exportShapefile() {
    if (!features.length) return showToast("No data", true);
    try {
        const zip = await shpwrite.zip({type:"FeatureCollection", features});
        const url = URL.createObjectURL(zip);
        const a = document.createElement('a');
        a.href = url; a.download = "features.zip"; a.click();
    } catch(e) { showToast("Shapefile failed", true); }
}

function showToast(msg, error=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = error ? '#ff6666' : '#00ff9d';
    t.style.color = error ? '#fff' : '#000';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function toggleLayerPanel() { /* add if needed */ alert("Layer panel coming soon"); }
function loadDemoData() {
    features = [ /* demo data */ ];
    refreshLayers(); renderTable(); saveToLocalStorage();
    showToast("Demo loaded");
}

// INIT
window.onload = () => {
    loadFromLocalStorage();
    if (features.length === 0) loadDemoData();
    refreshLayers();
    renderTable();
    setTimeout(toggleDrawControl, 500);   // Auto start draw tools
};
</script>
</body>
</html>
